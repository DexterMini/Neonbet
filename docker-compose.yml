# Casino Platform - Docker Compose Configuration
# Production-ready setup with PostgreSQL, Redis, and API

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: casino_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casino}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casino_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-casino}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-casino} -d ${POSTGRES_DB:-casino}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casino_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: casino_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret_2024}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casino_network

  # Casino API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: casino_api
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-casino}:${POSTGRES_PASSWORD:-casino_secret_2024}@db:5432/${POSTGRES_DB:-casino}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_2024}@redis:6379/0
      
      # App Settings
      APP_NAME: "Crypto Casino"
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      
      # Security
      JWT_SECRET: ${JWT_SECRET:-jwt-secret-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      
      # Game Settings
      HOUSE_EDGE: ${HOUSE_EDGE:-0.01}
      MIN_BET: ${MIN_BET:-0.0001}
      MAX_BET: ${MAX_BET:-10.0}
      
      # Wallet Settings
      HOT_WALLET_THRESHOLD: ${HOT_WALLET_THRESHOLD:-100.0}
      COLD_WALLET_THRESHOLD: ${COLD_WALLET_THRESHOLD:-1000.0}
      
      # Risk Settings
      MAX_WITHDRAWAL_PER_DAY: ${MAX_WITHDRAWAL_PER_DAY:-50.0}
      SUSPICIOUS_WIN_STREAK: ${SUSPICIOUS_WIN_STREAK:-10}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - casino_network
    volumes:
      - ./logs:/app/logs

  # Database Migrations (runs once)
  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: casino_migrations
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-casino}:${POSTGRES_PASSWORD:-casino_secret_2024}@db:5432/${POSTGRES_DB:-casino}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - casino_network
    restart: "no"

# Networks
networks:
  casino_network:
    driver: bridge

# Volumes for data persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
